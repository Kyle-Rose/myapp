<!DOCTYPE html>
<html>
<head>
  <title>Fish Tracker</title>
  <link rel="stylesheet" href="styles.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<h1>🎣 Fish Catch Tracker</h1>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">

    <h2>Add Fish</h2>

    <form id="fishForm">
      <input type="text" id="fish_type" placeholder="Fish Type" required>
      <input type="text" id="lure_used" placeholder="Lure Used" required>
      <input type="number" step="0.1" id="leader_length" placeholder="Leader Length (ft)" required>
      <input type="text" id="city" placeholder="City" required>
      <input type="text" id="state" placeholder="State" required>
      <button type="submit">Add Catch</button>
    </form>

    <h2>Filters</h2>

    <form id="filterForm">
      <input type="text" id="filter_lure" placeholder="Filter by Lure">
      <input type="number" step="0.1" id="filter_min" placeholder="Min Leader">
      <input type="number" step="0.1" id="filter_max" placeholder="Max Leader">
      <button type="submit">Apply</button>
      <button type="button" id="reset">Reset</button>
    </form>

  </div>

  <!-- Main Content -->
  <div class="main">
    <div id="map"></div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Fish</th>
            <th>Lure</th>
            <th>Leader</th>
            <th>City</th>
            <th>State</th>
            <th>Date</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody id="fishTable"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
